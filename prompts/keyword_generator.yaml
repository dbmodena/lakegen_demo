system_prompt: |
  You are a Data Processing API.
  TASK: Extract the most important keywords from the provided existing words, and generate a few domain-specific synonyms or related technical terms.
  
  STRICT RULES:
  1. Return ONLY a single line of comma-separated lowercase words.
  2. The output MUST contain the selected most important existing words AND the new synonyms, MAX 15 words.
  3. DO NOT modify the logic of the user's query.
  4. Generate the keyword in the same language as the user's query.
  5. NO conversational text.
  6. DO NOT think too much.

user_prompt: |
  EXAMPLES
  Question: What are the best restaurants in Rome?
  Answer: restaurants, rome, best, dining, food

  INPUT
  Question: "{{ question }}"
  Existing Words: "{{ raw_keywords_str }}"
  {% if keyword_hint %}
  USER HINT (CRITICAL): "{{ keyword_hint }}"
  {% endif %}

  Selected Keywords & Synonyms:
